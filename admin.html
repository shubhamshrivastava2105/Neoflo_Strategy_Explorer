<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin · Comment review — Neoflo Strategy Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design_tokens.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-family-plus-jakarta-sans);
    background: var(--surface-pagecard-page);
    color: var(--text-default-body);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  a { color: var(--text-primary-default); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header {
    background: var(--grey-1000);
    color: var(--text-on-colour-body);
    padding: var(--scale-300) var(--scale-500);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: var(--scale-300);
    position: sticky; top: 0; z-index: 10;
    box-shadow: var(--shadow-medium);
  }
  header .brand { display: flex; align-items: center; gap: var(--scale-200); }
  header .brand .mark {
    width: 28px; height: 28px; border-radius: var(--radius-sm);
    background: var(--surface-warning-default); color: var(--grey-1000);
    display: grid; place-items: center; font-weight: 700; font-size: 13px;
  }
  header .brand .name { color: white; font-weight: 600; font-size: 15px; }
  header .brand .sub {
    color: var(--text-warning-default);
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;
  }
  header .actions { display: flex; gap: var(--scale-200); align-items: center; }
  header .actions a {
    color: var(--text-on-colour-caption);
    font-size: 13px;
    padding: var(--scale-100) var(--scale-200);
    border-radius: var(--radius-sm);
  }
  header .actions a:hover { background: var(--border-call-out-card-1); color: white; text-decoration: none; }

  main { max-width: 900px; margin: 0 auto; padding: var(--scale-500) var(--scale-400); }

  h1 {
    font-family: var(--font-family-instrument-serif);
    font-weight: 400;
    font-size: 40px;
    line-height: 1.1;
    letter-spacing: -1px;
    margin: 0 0 var(--scale-200);
    color: var(--text-default-heading);
  }
  h1 em { font-style: italic; }

  .lede { font-size: 15px; color: var(--text-default-caption); margin: 0 0 var(--scale-400); }

  .filters {
    display: flex; gap: var(--scale-100); margin-bottom: var(--scale-400);
    background: var(--surface-pagecard-card-1);
    padding: var(--scale-100);
    border-radius: 999px;
    border: 1px solid var(--border-pagecard-card-1);
    width: max-content;
  }
  .filter {
    padding: var(--scale-200) var(--scale-300);
    border: none;
    background: transparent;
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-default-caption);
    transition: all 120ms ease;
  }
  .filter:hover { color: var(--text-default-body); }
  .filter.active { background: var(--grey-1000); color: white; }
  .filter .count {
    display: inline-block;
    margin-left: var(--scale-100);
    padding: 1px 8px;
    border-radius: 999px;
    background: var(--grey-200);
    color: var(--text-default-caption);
    font-size: 11px;
  }
  .filter.active .count { background: var(--surface-warning-default); color: var(--grey-1000); }

  .empty {
    text-align: center;
    padding: var(--scale-1025) var(--scale-400);
    background: var(--surface-pagecard-card-1);
    border-radius: var(--radius-md);
    border: 1px dashed var(--border-default-default);
    color: var(--text-default-caption);
    font-size: 14px;
  }
  .empty .icon { font-size: 36px; margin-bottom: var(--scale-200); }

  .comment-list { display: flex; flex-direction: column; gap: var(--scale-300); }

  .comment {
    background: var(--surface-pagecard-card-1);
    border: 1px solid var(--border-pagecard-card-1);
    border-radius: var(--radius-md);
    padding: var(--scale-400);
    box-shadow: var(--shadow-small);
  }
  .comment.resolved { opacity: 0.7; }
  .comment-head {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: var(--scale-200); margin-bottom: var(--scale-200);
  }
  .comment-title { font-size: 16px; font-weight: 600; color: var(--text-default-heading); margin: 0; flex: 1; min-width: 0; }
  .comment-meta {
    font-size: 12px; color: var(--text-default-caption);
    margin-bottom: var(--scale-300);
  }
  .comment-meta a { color: var(--text-default-caption); text-decoration: underline; }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-open { background: var(--surface-warning-subtle); color: var(--text-warning-on-color); }
  .badge-resolved { background: var(--surface-success-subtle); color: var(--text-success-on-color); }

  .comment-body {
    background: var(--grey-50);
    border-left: 3px solid var(--border-default-default);
    padding: var(--scale-250) var(--scale-300);
    border-radius: var(--radius-sm);
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: var(--scale-300);
    font-family: var(--font-family-inter);
    color: var(--text-default-body);
  }
  .comment-body strong { color: var(--text-default-heading); }
  .comment-actions { display: flex; gap: var(--scale-200); align-items: center; flex-wrap: wrap; }
  .comment-actions button {
    padding: var(--scale-200) var(--scale-300);
    border: 1px solid var(--border-default-default);
    background: var(--surface-pagecard-card-1);
    border-radius: var(--radius-sm);
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: all 120ms ease;
    color: var(--text-default-body);
  }
  .comment-actions button:hover:not(:disabled) {
    border-color: var(--border-default-default-hover);
    background: var(--grey-50);
  }
  .comment-actions button.primary {
    background: var(--surface-success-default);
    color: white;
    border-color: var(--border-success-default);
  }
  .comment-actions button.primary:hover:not(:disabled) {
    background: var(--surface-success-default-hover);
  }
  .comment-actions button.secondary {
    background: var(--surface-pagecard-card-1);
    color: var(--text-default-caption);
  }
  .comment-actions button:disabled { opacity: 0.5; cursor: not-allowed; }
  .comment-actions a {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-default-caption);
  }

  .loading {
    text-align: center;
    padding: var(--scale-800);
    color: var(--text-default-caption);
    font-size: 14px;
  }
  .error-banner {
    background: var(--surface-error-subtle);
    border-left: 3px solid var(--border-error-default);
    color: var(--text-error-on-color);
    padding: var(--scale-300);
    border-radius: var(--radius-sm);
    margin-bottom: var(--scale-300);
    font-size: 14px;
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="mark">N</div>
      <div>
        <div class="name">Neoflo Strategy Explorer</div>
        <div class="sub">Admin · Comment review</div>
      </div>
    </div>
    <div class="actions">
      <a href="/">View memo</a>
      <a href="/api/admin-logout">Sign out</a>
    </div>
  </header>

  <main>
    <h1>Comments &amp; <em>feedback</em></h1>
    <p class="lede">All comments left on the strategy memo. Resolve to mark complete (closes the GitHub issue). Reopen if needed.</p>

    <div class="filters">
      <button class="filter active" data-state="open">Open <span class="count" id="count-open">—</span></button>
      <button class="filter" data-state="closed">Resolved <span class="count" id="count-closed">—</span></button>
      <button class="filter" data-state="all">All <span class="count" id="count-all">—</span></button>
    </div>

    <div id="errorBanner" class="error-banner" style="display:none;"></div>
    <div id="content" class="loading">Loading comments…</div>
  </main>

  <script>
    let currentState = 'open';
    let cache = { open: null, closed: null, all: null };

    async function fetchIssues(state) {
      const res = await fetch(`/api/admin-comments?state=${state}`);
      if (!res.ok) {
        if (res.status === 401) {
          location.href = '/admin-login.html';
          return null;
        }
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      const data = await res.json();
      return data.issues || [];
    }

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function renderBody(body) {
      // Simple markdown rendering for **bold** + line breaks + horizontal rule
      let html = escapeHtml(body);
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border-pagecard-card-1);margin:var(--scale-200) 0;" />');
      return html;
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) + ' · ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    }

    async function updateCounts() {
      try {
        const [open, closed] = await Promise.all([
          cache.open || fetchIssues('open'),
          cache.closed || fetchIssues('closed'),
        ]);
        if (open === null || closed === null) return;
        cache.open = open;
        cache.closed = closed;
        cache.all = [...open, ...closed].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        document.getElementById('count-open').textContent = open.length;
        document.getElementById('count-closed').textContent = closed.length;
        document.getElementById('count-all').textContent = cache.all.length;
      } catch (e) {
        showError(e.message);
      }
    }

    function showError(msg) {
      const banner = document.getElementById('errorBanner');
      banner.textContent = msg;
      banner.style.display = 'block';
      setTimeout(() => { banner.style.display = 'none'; }, 5000);
    }

    async function render() {
      const content = document.getElementById('content');
      content.className = 'loading';
      content.textContent = 'Loading comments…';
      try {
        let issues = cache[currentState];
        if (!issues) {
          issues = await fetchIssues(currentState);
          if (issues === null) return;
          cache[currentState] = issues;
        }
        if (!issues.length) {
          content.className = 'empty';
          content.innerHTML = `<div class="icon">💭</div>No ${currentState === 'all' ? '' : currentState} comments yet.`;
          return;
        }
        content.className = 'comment-list';
        content.innerHTML = issues.map(issue => `
          <div class="comment ${issue.state === 'closed' ? 'resolved' : ''}" data-number="${issue.number}">
            <div class="comment-head">
              <h3 class="comment-title">${escapeHtml(issue.title)}</h3>
              <span class="badge ${issue.state === 'closed' ? 'badge-resolved' : 'badge-open'}">${issue.state === 'closed' ? 'Resolved' : 'Open'}</span>
            </div>
            <div class="comment-meta">#${issue.number} · ${formatDate(issue.created_at)}${issue.closed_at ? ` · resolved ${formatDate(issue.closed_at)}` : ''}</div>
            <div class="comment-body">${renderBody(issue.body)}</div>
            <div class="comment-actions">
              ${issue.state === 'open'
                ? `<button class="primary" data-action="resolve" data-number="${issue.number}">✓ Resolve</button>`
                : `<button class="secondary" data-action="reopen" data-number="${issue.number}">↻ Reopen</button>`}
              <a href="${escapeHtml(issue.html_url)}" target="_blank" rel="noopener">View on GitHub ↗</a>
            </div>
          </div>
        `).join('');

        content.querySelectorAll('button[data-action]').forEach(btn => {
          btn.addEventListener('click', () => updateIssue(parseInt(btn.dataset.number, 10), btn.dataset.action, btn));
        });
      } catch (e) {
        content.className = '';
        content.innerHTML = '';
        showError(e.message);
      }
    }

    async function updateIssue(number, action, btn) {
      btn.disabled = true;
      btn.textContent = action === 'resolve' ? 'Resolving…' : 'Reopening…';
      try {
        const res = await fetch('/api/admin-comments', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ number, action }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }
        // Invalidate cache and re-render
        cache = { open: null, closed: null, all: null };
        await updateCounts();
        await render();
      } catch (e) {
        btn.disabled = false;
        btn.textContent = action === 'resolve' ? '✓ Resolve' : '↻ Reopen';
        showError(e.message);
      }
    }

    document.querySelectorAll('.filter').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentState = btn.dataset.state;
        render();
      });
    });

    // Initial load
    (async () => {
      await updateCounts();
      await render();
    })();
  </script>
</body>
</html>
