<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin sign in — Neoflo Strategy Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design_tokens.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-family-plus-jakarta-sans);
    background: var(--grey-1000);
    color: var(--text-on-colour-body);
    display: grid;
    place-items: center;
    min-height: 100vh;
    padding: var(--scale-400);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(254,193,52,0.16), transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(255,56,60,0.12), transparent 50%);
  }
  .card {
    background: var(--surface-pagecard-card-1);
    color: var(--text-default-body);
    width: 100%;
    max-width: 440px;
    padding: var(--scale-800);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-large);
  }
  .brand {
    display: flex; align-items: center; gap: var(--scale-200);
    margin-bottom: var(--scale-500);
  }
  .brand .mark {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    background: var(--grey-1000);
    color: white;
    display: grid; place-items: center;
    font-weight: 700; font-size: 16px;
  }
  .brand .name {
    font-size: 16px; font-weight: 600; letter-spacing: -0.5px;
    color: var(--text-default-heading);
  }
  .brand .sub {
    font-size: 11px; color: var(--text-warning-on-color);
    text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;
  }
  h1 {
    font-family: var(--font-family-instrument-serif);
    font-weight: 400;
    font-size: 36px;
    line-height: 1.1;
    letter-spacing: -1px;
    margin: 0 0 var(--scale-200);
    color: var(--text-default-heading);
  }
  h1 em { font-style: italic; }
  .lede {
    font-size: 14px;
    color: var(--text-default-caption);
    margin: 0 0 var(--scale-500);
  }
  .field { margin-bottom: var(--scale-300); }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-default-caption);
    margin-bottom: var(--scale-100);
  }
  .field input {
    width: 100%;
    padding: var(--scale-250) var(--scale-300);
    border: 1px solid var(--border-default-default);
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-family: inherit;
    color: var(--text-default-body);
    background: var(--surface-pagecard-card-1);
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .field input:focus {
    outline: none;
    border-color: var(--border-warning-default);
    box-shadow: 0 0 0 3px var(--surface-warning-subtle);
  }
  button[type="submit"] {
    width: 100%;
    padding: var(--scale-250) var(--scale-300);
    background: var(--grey-1000);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-top: var(--scale-200);
    transition: background 120ms ease;
  }
  button[type="submit"]:hover { background: var(--grey-900); }
  .error {
    background: var(--surface-error-subtle);
    border-left: 3px solid var(--border-error-default);
    color: var(--text-error-on-color);
    padding: var(--scale-200) var(--scale-300);
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: var(--scale-300);
  }
  .footer {
    margin-top: var(--scale-500);
    font-size: 12px;
    color: var(--text-default-caption);
    text-align: center;
  }
  .footer a { color: var(--text-default-caption); text-decoration: underline; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="mark">N</div>
      <div>
        <div class="name">Neoflo</div>
        <div class="sub">Admin · Comment review</div>
      </div>
    </div>
    <h1>Admin <em>sign in</em></h1>
    <p class="lede">Review and resolve comments left by team members on the strategy memo.</p>
    <div id="error" class="error" style="display: none;">Incorrect email or password.</div>
    <form id="loginForm" method="POST" action="/api/admin-auth" autocomplete="on">
      <div class="field">
        <label for="email">Admin email</label>
        <input type="email" id="email" name="email" required autocomplete="username" autofocus />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit">Sign in</button>
    </form>
    <div class="footer">
      Not an admin? <a href="/login.html">Go to user sign in</a>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error') === '1') {
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
